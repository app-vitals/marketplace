name: Validate Marketplace JSON

on:
  pull_request:
    paths:
      - '.claude-plugin/marketplace.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate marketplace.json
        run: bash .github/scripts/validate-marketplace.sh

      - name: Check plugins sorted
        run: bash .github/scripts/check-marketplace-sorted.sh
